name: Sync Catalog

on:
  schedule:
    # Runs every day at 06:00 UTC (adjust to your timezone)
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch catalog from Google Sheets
        run: node scripts/fetch-catalog.js

      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/index.html
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore: sync catalog from Google Sheets [skip ci]"
            git push
          fi
